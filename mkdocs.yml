# MkDocs Material 設定 — tws_lp_jis60 ビルドガイドを GitHub Pages へ公開
# ローカルプレビュー: pip install -r requirements.txt && mkdocs serve
site_name: tws_lp_jis60 ビルドガイド
site_description: JIS配列・ロープロファイル・完全無線の左右分割60%キーボード ビルドガイド
site_author: B-SKY Lab
site_url: https://ar-kr.github.io/tws_lp_jis60/

repo_url: https://github.com/ar-kr/tws_lp_jis60
repo_name: ar-kr/tws_lp_jis60

# ビルドガイド単体を公開するため、そのフォルダをドキュメントルートにする。
# build_guide.md はそのまま（リネームしない）。トップページは index.md が担う。
docs_dir: docs/build_guide
site_dir: site

# CC-BY-SA-4.0 のフッター表記
copyright: Copyright &copy; B-SKY Lab — CC-BY-SA-4.0

nav:
  - ビルドガイド: build_guide.md

theme:
  name: material
  language: ja
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.top      # トップへ戻るボタン
    - navigation.tracking # スクロールに追従してURLを更新
    - toc.follow          # 目次がスクロールに追従
    - search.highlight    # 検索ヒット箇所をハイライト
    - search.suggest      # 検索サジェスト
    - content.code.copy   # コードブロックのコピーボタン
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

markdown_extensions:
  - admonition          # 警告/注意ボックスのスタイル基盤
  - github-callouts     # GFMアラート `> [!CAUTION]` などを描画（markdown-callouts）
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true   # 見出しにアンカーリンクを付与

plugins:
  - search              # 全文検索（日本語はCJK分割で対応）
