# ビルドガイド（Astro Starlight）を GitHub Pages へ自動デプロイする。
# main への push（ガイド関連ファイル変更時）と手動実行で動作する。
# 事前に GitHub の Settings > Pages > Build and deployment > Source を
# 「GitHub Actions」に設定しておくこと。
name: Deploy build guide to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/build_guide/**"
      - "src/**"
      - "scripts/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に制限（走行中は中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (sync + astro build)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
